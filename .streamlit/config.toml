[theme]
base = "dark"
backgroundColor = "#050a05"
secondaryBackgroundColor = "#070e07"
textColor = "#33ff33"
font = "monospace"

[server]
headless = true
enableCORS = false
# NOTE: no static `port` here on purpose. The desktop launcher (desktop.py) binds
# a dynamic free port via flag_options; a fixed port here conflicts with Streamlit's
# developmentMode check in the frozen build. Dev `streamlit run` uses the default 8501.

[browser]
gatherUsageStats = false
